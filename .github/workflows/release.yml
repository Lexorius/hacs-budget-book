name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (z.B. v0.2.2)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"      >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag: $TAG / Version: $VERSION"

      - name: Verify manifest version matches tag
        run: |
          MANIFEST_VERSION=$(python -c "import json; print(json.load(open('custom_components/haushaltsdoku/manifest.json'))['version'])")
          if [ "$MANIFEST_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::manifest.json hat $MANIFEST_VERSION, Tag verlangt ${{ steps.version.outputs.version }}"
            exit 1
          fi
          echo "✓ manifest.json passt zum Tag"

      - name: Build release ZIP (HACS-konform)
        run: |
          # HACS erwartet das Asset namens haushaltsdoku.zip mit den
          # Files der Integration im Root des ZIPs (ohne custom_components/<domain>/ Wrapper).
          cd custom_components/haushaltsdoku
          zip -rq "${GITHUB_WORKSPACE}/haushaltsdoku.zip" . -x "__pycache__/*" "*/__pycache__/*"
          cd "$GITHUB_WORKSPACE"
          echo "── Inhalt des Release-ZIPs ──"
          unzip -l haushaltsdoku.zip

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import re, os
          version = os.environ["VERSION"]
          text = open("CHANGELOG.md", encoding="utf-8").read()
          # Sektion "## [X.Y.Z]" bis zur nächsten "## ["
          m = re.search(rf"## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)",
                        text, re.S)
          notes = (m.group(1).strip() if m
                   else f"Release {version} – siehe CHANGELOG.md")
          # Multi-line output via heredoc-Marker
          print("notes<<EOF_NOTES")
          print(notes)
          print("EOF_NOTES")
          PY
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}
          files: haushaltsdoku.zip
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
