name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag (z.B. v0.2.5)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tag und Version ermitteln
        id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: manifest.json muss zum Tag passen
        run: |
          MV=$(python -c "import json; print(json.load(open('custom_components/haushaltsdoku/manifest.json'))['version'])")
          if [ "$MV" != "${{ steps.v.outputs.version }}" ]; then
            echo "::error::manifest.json=$MV, Tag verlangt ${{ steps.v.outputs.version }}"
            exit 1
          fi

      - name: ZIP-Asset bauen
        run: |
          cd custom_components/haushaltsdoku
          zip -rq "$GITHUB_WORKSPACE/haushaltsdoku.zip" . \
            -x "__pycache__/*" "*/__pycache__/*" "*.pyc"

      - name: Release-Notes aus CHANGELOG ziehen
        id: notes
        env:
          VERSION: ${{ steps.v.outputs.version }}
        run: |
          {
            echo "notes<<EOF_NOTES"
            python - <<'PY'
          import os, re
          v = os.environ["VERSION"]
          text = open("CHANGELOG.md", encoding="utf-8").read()
          m = re.search(rf"## \[{re.escape(v)}\][^\n]*\n(.*?)(?=\n## \[|\Z)",
                        text, re.S)
          print((m.group(1).strip() if m else f"Release {v}"))
          PY
            echo "EOF_NOTES"
          } >> "$GITHUB_OUTPUT"

      - name: GitHub-Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.v.outputs.tag }}
          name: ${{ steps.v.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}
          files: haushaltsdoku.zip
          prerelease: ${{ contains(steps.v.outputs.tag, '-') }}
