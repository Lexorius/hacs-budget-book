name: Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Wöchentlich gegen aktuellste HA/HACS-Version testen
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  hassfest:
    name: Home Assistant hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HACS Action
        uses: hacs/action@main
        with:
          category: integration

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff pyyaml

      - name: Python syntax check
        run: |
          python -m compileall -q custom_components/

      - name: Ruff (style)
        run: ruff check custom_components/ --select E,F,W,I --line-length 100

      - name: Validate JSON files
        run: |
          python - <<'PY'
          import json, sys
          from pathlib import Path
          ok = True
          for f in Path(".").rglob("*.json"):
              if any(p in f.parts for p in (".git", "node_modules")):
                  continue
              try:
                  json.loads(f.read_text(encoding="utf-8"))
                  print(f"OK  {f}")
              except Exception as e:
                  print(f"FAIL {f}: {e}")
                  ok = False
          sys.exit(0 if ok else 1)
          PY

      - name: Validate YAML files
        run: |
          python - <<'PY'
          import sys, yaml
          from pathlib import Path
          ok = True
          for f in list(Path(".").rglob("*.yml")) + list(Path(".").rglob("*.yaml")):
              try:
                  yaml.safe_load(f.read_text(encoding="utf-8"))
                  print(f"OK  {f}")
              except Exception as e:
                  print(f"FAIL {f}: {e}")
                  ok = False
          sys.exit(0 if ok else 1)
          PY

  consistency:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check manifest version is in CHANGELOG
        run: |
          MANIFEST_VERSION=$(python -c "import json; print(json.load(open('custom_components/haushaltsdoku/manifest.json'))['version'])")
          echo "manifest.json version: $MANIFEST_VERSION"
          if ! grep -q "\[$MANIFEST_VERSION\]" CHANGELOG.md; then
            echo "::error::Version $MANIFEST_VERSION nicht in CHANGELOG.md gefunden"
            exit 1
          fi
          echo "✓ CHANGELOG enthält Eintrag für $MANIFEST_VERSION"
