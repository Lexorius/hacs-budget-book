generate_monthly_report:
  name: Monatsbericht erzeugen
  description: Erstellt einen HTML-Monatsbericht für alle konfigurierten Zähler.
  fields:
    year:
      name: Jahr
      description: Jahr (z.B. 2026). Standard ist das aktuelle Jahr.
      example: 2026
      selector:
        number:
          min: 2000
          max: 2100
          mode: box
    month:
      name: Monat
      description: Monat 1-12. Standard ist der aktuelle Monat.
      example: 4
      selector:
        number:
          min: 1
          max: 12
          mode: box

generate_yearly_report:
  name: Jahresbericht erzeugen
  description: Erstellt einen HTML-Jahresbericht für alle konfigurierten Zähler.
  fields:
    year:
      name: Jahr
      example: 2025
      selector:
        number:
          min: 2000
          max: 2100
          mode: box

generate_range_report:
  name: Bericht für Zeitraum
  description: Erstellt einen Bericht für einen frei gewählten Zeitraum.
  fields:
    start:
      name: Startzeitpunkt
      required: true
      selector:
        datetime:
    end:
      name: Endzeitpunkt
      required: true
      selector:
        datetime:
    title:
      name: Titel
      example: Urlaub Sommer 2025
      selector:
        text:

add_reading:
  name: Zählerstand eintragen
  description: >-
    Trägt einen neuen Zählerstand für einen manuellen Zähler ein.
  fields:
    meter_name:
      name: Zähler-Name
      description: Name des Zählers wie in der Konfiguration.
      example: "Wasser Haushalt"
      selector:
        text:
    meter_id:
      name: Zähler-ID
      description: Alternativ die interne ID (UUID) des Zählers.
      selector:
        text:
    value:
      name: Neuer Stand
      description: Der abgelesene Zählerstand.
      required: true
      example: 12345.678
      selector:
        number:
          min: 0
          step: 0.001
          mode: box
    timestamp:
      name: Zeitpunkt
      description: Zeitpunkt der Ablesung. Standard ist jetzt.
      selector:
        datetime:
